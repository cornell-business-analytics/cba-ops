name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo typecheck

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cba
          POSTGRES_PASSWORD: cba_test
          POSTGRES_DB: cba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: apps/backend
        run: uv sync --extra dev

      - name: Run migrations
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+asyncpg://cba:cba_test@localhost:5432/cba_test
        run: uv run alembic upgrade head

      - name: Run tests
        working-directory: apps/backend
        env:
          DATABASE_URL: postgresql+asyncpg://cba:cba_test@localhost:5432/cba_test
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_CLIENT_ID: test-client-id
          JWT_PRIVATE_KEY: ${{ secrets.TEST_JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.TEST_JWT_PUBLIC_KEY }}
          REVALIDATE_SECRET: test-secret
        run: uv run pytest --cov=app --cov-report=xml -q

      - uses: codecov/codecov-action@v5
        with:
          files: apps/backend/coverage.xml
          flags: backend

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm turbo test

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @cba/e2e exec playwright install --with-deps chromium firefox

      - name: Start services
        run: docker compose -f infra/docker-compose.yml up -d --wait postgres redis backend
        env:
          COMPOSE_PROFILES: ci

      - name: Run E2E tests
        run: pnpm --filter @cba/e2e e2e
        env:
          BASE_URL_WEBSITE: http://localhost:3001
          BASE_URL_FRONTEND: http://localhost:3000
          API_URL: http://localhost:8000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/e2e/playwright-report/
          retention-days: 7
